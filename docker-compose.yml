services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwtguard_app
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.dev
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /app/certs/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /app/certs/jwt_public.pem
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0
    volumes:
      - .:/app
      - ./certs:/app/certs:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  postgres:
    image: postgres:16
    container_name: jwtguard_postgres
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - jwtguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7
    container_name: jwtguard_redis
    ports:
      - "6379:6379"
    volumes:
      - jwtguard_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  jwtguard_postgres_data:
  jwtguard_redis_data: